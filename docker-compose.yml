services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stitchinghub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stitchinghub"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: StitchingHub
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stitchinghub?schema=public
      JWT_ACCESS_SECRET: replace-with-a-long-random-secret-for-local-dev
      JWT_REFRESH_SECRET: replace-with-a-different-long-random-secret-local
      PAYMENT_PROVIDER: razorpay
      NOTIFY_EMAIL_PROVIDER: console
      NOTIFY_SMS_PROVIDER: console
      NOTIFY_WHATSAPP_PROVIDER: console
    ports:
      - "3000:3000"

volumes:
  postgres-data:
